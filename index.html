<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Filament Transmittance & LUT Generator</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #09090b; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        function PETGTransmissionTool() {
            const filamentDatabase = {
                "Elegoo Rapid PETG White": { alpha: 0.6 },
                "Generic White PLA": { alpha: 0.85 },
                "Transparent PETG": { alpha: 0.25 },
                "White ABS": { alpha: 1.1 },
            };

            const [lumens, setLumens] = React.useState(806);
            const [distance, setDistance] = React.useState(10);
            const [bulbDiameter, setBulbDiameter] = React.useState(6);
            const [thickness, setThickness] = React.useState(5);
            const [selectedFilament, setSelectedFilament] = React.useState("Elegoo Rapid PETG White");

            const alpha = filamentDatabase[selectedFilament].alpha;

            const generateData = () => {
                const transmittanceData = [];
                const curveData = [];
                const lutData = [];

                for (let x = 0; x <= thickness; x += 0.1) {
                    const T = Math.exp(-alpha * x);
                    const transmittedLumens = lumens * T;

                    transmittanceData.push({
                        thickness: Number(x.toFixed(2)),
                        transmittance: Number((T * 100).toFixed(2)),
                        lumens: Number(transmittedLumens.toFixed(2)),
                    });
                }

                for (let i = 0; i <= 255; i++) {
                    const brightness = i / 255;
                    const corrected = -Math.log(Math.max(0.001, brightness));
                    const normalized = Math.min(corrected / 6, 1);
                    const output = Math.round(normalized * 255);

                    curveData.push({ input: i, output });
                    lutData.push(output);
                }

                return { transmittanceData, curveData, lutData };
            };

            const data = generateData();

            const downloadLUT = () => {
                const blob = new Blob([JSON.stringify(data.lutData, null, 2)], { type: "application/json" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url;
                a.download = "lut-data.json";
                a.click();
            };

            return (
                <div className="min-h-screen bg-zinc-950 text-zinc-100 p-6">
                    <div className="max-w-7xl mx-auto space-y-6">
                        <div>
                            <h1 className="text-4xl font-bold mb-2">3D Filament Transmittance & LUT Generator</h1>
                            <p className="text-zinc-400 max-w-3xl">
                                Generate Beer-Lambert transmittance curves, image correction curves, and LUT mapping data for creating lithophane and backlit height-map images using 3D printer filament.
                            </p>
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                            <div className="bg-zinc-900 rounded-2xl p-6 shadow-xl space-y-4">
                                <h2 className="text-2xl font-semibold">Light Globe Settings</h2>
                                <div>
                                    <label className="block mb-1 text-sm text-zinc-400">Globe Lumens</label>
                                    <input type="number" value={lumens} onChange={(e) => setLumens(Number(e.target.value))} className="w-full bg-zinc-800 rounded-xl p-3" />
                                </div>
                                <div>
                                    <label className="block mb-1 text-sm text-zinc-400">Globe Diameter (cm)</label>
                                    <input type="number" value={bulbDiameter} onChange={(e) => setBulbDiameter(Number(e.target.value))} className="w-full bg-zinc-800 rounded-xl p-3" />
                                </div>
                                <div>
                                    <label className="block mb-1 text-sm text-zinc-400">Distance from Material (cm)</label>
                                    <input type="number" value={distance} onChange={(e) => setDistance(Number(e.target.value))} className="w-full bg-zinc-800 rounded-xl p-3" />
                                </div>
                            </div>

                            <div className="bg-zinc-900 rounded-2xl p-6 shadow-xl space-y-4">
                                <h2 className="text-2xl font-semibold">Filament Settings</h2>
                                <div>
                                    <label className="block mb-1 text-sm text-zinc-400">Filament Type</label>
                                    <select value={selectedFilament} onChange={(e) => setSelectedFilament(e.target.value)} className="w-full bg-zinc-800 rounded-xl p-3">
                                        {Object.keys(filamentDatabase).map((filament) => (<option key={filament}>{filament}</option>))}
                                    </select>
                                </div>
                                <div className="bg-zinc-800 rounded-xl p-4">
                                    <div className="text-sm text-zinc-400">Absorption Coefficient (α)</div>
                                    <div className="text-2xl font-bold">{alpha} mm⁻¹</div>
                                </div>
                                <div>
                                    <label className="block mb-1 text-sm text-zinc-400">Maximum Material Thickness (mm)</label>
                                    <input type="number" step="0.1" value={thickness} onChange={(e) => setThickness(Number(e.target.value))} className="w-full bg-zinc-800 rounded-xl p-3" />
                                </div>
                            </div>
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                            <div className="bg-zinc-900 rounded-2xl p-6 shadow-xl overflow-auto">
                                <h2 className="text-2xl font-semibold mb-4">Material Transmittance Graph</h2>
                                <div className="space-y-2 text-sm font-mono">
                                    {data.transmittanceData.slice(0, 30).map((d, idx) => (
                                        <div key={idx} className="grid grid-cols-3 border-b border-zinc-800 py-1">
                                            <div>{d.thickness} mm</div>
                                            <div>{d.transmittance}%</div>
                                            <div>{d.lumens} lm</div>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            <div className="bg-zinc-900 rounded-2xl p-6 shadow-xl overflow-auto">
                                <h2 className="text-2xl font-semibold mb-4">Image Adjustment Curve</h2>
                                <div className="space-y-2 text-sm font-mono">
                                    {data.curveData.slice(0, 40).map((d, idx) => (
                                        <div key={idx} className="grid grid-cols-2 border-b border-zinc-800 py-1">
                                            <div>Input: {d.input}</div>
                                            <div>Output: {d.output}</div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>

                        <div className="bg-zinc-900 rounded-2xl p-6 shadow-xl space-y-4">
                            <h2 className="text-2xl font-semibold">LUT Heightmap Conversion Data</h2>
                            <p className="text-zinc-400">
                                This LUT data can be used to generate a grayscale image conversion profile that compensates for exponential light attenuation through the filament material.
                            </p>
                            <div className="bg-zinc-950 rounded-xl p-4 overflow-auto text-xs font-mono max-h-80">
                                {JSON.stringify(data.lutData.slice(0, 128), null, 2)}
                            </div>
                            <button onClick={downloadLUT} className="bg-white text-black px-6 py-3 rounded-xl font-semibold hover:opacity-80 transition">
                                Download LUT JSON
                            </button>
                        </div>

                        <div className="bg-zinc-900 rounded-2xl p-6 shadow-xl">
                            <h2 className="text-2xl font-semibold mb-4">Mathematical Model</h2>
                            <div className="space-y-3 text-zinc-300">
                                <div>Beer-Lambert Equation: <div className="font-mono text-green-400 mt-1">T = e^(-αx)</div></div>
                                <div>Inverse Brightness Correction: <div className="font-mono text-cyan-400 mt-1">x = -ln(T) / α</div></div>
                                <div>This workflow compensates for nonlinear light attenuation through 3D printed filament and generates more accurate backlit lithophane-style images.</div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<PETGTransmissionTool />);
    </script>
</body>
</html>
